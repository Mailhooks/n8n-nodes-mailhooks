name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Check version change
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        id: version_check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          NPM_VERSION=$(npm view n8n-nodes-mailhooks version 2>/dev/null || echo "0.0.0")
          echo "npm_version=$NPM_VERSION" >> $GITHUB_OUTPUT

          if [ "$CURRENT_VERSION" = "$NPM_VERSION" ]; then
            echo "Version $CURRENT_VERSION is already published. Skipping."
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "New version detected: $CURRENT_VERSION (npm has $NPM_VERSION)"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Update version (if manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: npm version "$INPUT_VERSION" --no-git-tag-version

      - name: Build package
        run: npm run build

      - name: Publish to npm
        if: |
          github.event_name == 'workflow_dispatch' ||
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'push' && steps.version_check.outputs.should_publish == 'true')
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        if: github.event_name == 'push' && steps.version_check.outputs.should_publish == 'true'
        env:
          VERSION: ${{ steps.version_check.outputs.current_version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && steps.version_check.outputs.should_publish == 'true')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version_check.outputs.current_version) }}
          release_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version_check.outputs.current_version) }}
          body: |
            ## Installation
            ```bash
            npm install n8n-nodes-mailhooks
            ```

            Or install directly in n8n:
            1. Go to **Settings** > **Community Nodes**
            2. Select **Install**
            3. Enter `n8n-nodes-mailhooks`
            4. Agree to the risks and select **Install**

            ## Changes
            See the [commit history](https://github.com/${{ github.repository }}/commits/${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version_check.outputs.current_version) }}) for details.
          draft: false
          prerelease: false
